; ==========================================
; table-tools 配置文件
; 分号开头为注释，等号左边是配置项名，右边是值
; 留空的值 = 使用程序内置默认值
; 命令行参数会覆盖此文件的设置
; ==========================================

[AI]
; AI API 地址 (NVIDIA NIM / OpenAI 兼容格式)
api_url = https://integrate.api.nvidia.com/v1/chat/completions
; API 密钥 (必填，否则 chat/news --analyze 无法使用)
api_key = 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
; AI 模型名称 (使用 NVIDIA NIM 上的模型)
model = qwen/qwen3-coder-480b-a35b-instruct

; ==========================================
; 各模块通用 AI 设置 (留空则继承 [AI] 节)
; 各模块配置了独立的 api_url/api_key/model 时会覆盖 [AI] 节
; ==========================================

[chat]
; AI 对话模块 — 留空则继承 [AI] 节的 NVIDIA API 设置
api_url =
api_key =
model =

[news]
; 新闻 AI 分析 — 留空则继承 [AI] 节的 NVIDIA API 设置

[translate]
; 翻译引擎: mymemory(免费) / ai(需配置API，使用 [AI] 节设置)
engine = mymemory

; ==========================================
; 各模块默认参数
; ==========================================

[stone]
; 画布宽度 (字符数)
width = 60
; 画布高度 (行数)
height = 30
; 目标石头数量
count = 120

[document]
; 默认发文单位名称
org = 厦门市教育局
; 默认文件类型: 通知 / 通报 / 决定 / 批复
type = 通知

[mc-ping]
; 默认 Minecraft 服务器地址 (留空则每次必须输入)
host = fm.rainplay.cn
; 默认端口
port = 25065

[chess]
; 是否启用 AI 对手: true / false
ai = false

[prompt]
; 自定义提示词模板文件路径 (JSON 格式，留空使用内置模板)
template =

[project-tree]
; 默认输出根目录 (. 表示当前目录)
output = .
